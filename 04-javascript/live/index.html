<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Live Coding</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <main class="todo-app">
        <header class="hero">
          <p class="eyebrow">JavaScript Live Coding</p>
          <h1>오늘 할 일</h1>
          <p class="description">
            HTML과 CSS로 먼저 화면 틀을 만들고, JavaScript로 입력/추가/완료/삭제 기능을
            하나씩 붙여봅니다.
          </p>
        </header>

        <section class="todo-panel">
          <form class="todo-form" id="todo-form">
            <label class="sr-only" for="todo-input">할 일 입력</label>
            <input
              id="todo-input"
              type="text"
              placeholder="예: JavaScript 복습하기"
              autocomplete="off"
            />
            <button type="submit">추가</button>
          </form>

          <div class="todo-summary">
            <strong>2개</strong>
            <span>남은 할 일</span>
          </div>

          <ul class="todo-list" id="todo-list">
            <li class="todo-item">
              <span class="todo-text">강의 예제 폴더 정리하기</span>
              <button class="complete-button" type="button">완료</button>
              <button class="delete-button" type="button">삭제</button>
            </li>
            <li class="todo-item">
              <span class="todo-text">JavaScript 기본 문법 복습하기</span>
              <button class="complete-button" type="button">완료</button>
              <button class="delete-button" type="button">삭제</button>
            </li>
            <li class="todo-item done">
              <span class="todo-text">HTML 구조 만들기</span>
              <button class="complete-button" type="button">취소</button>
              <button class="delete-button" type="button">삭제</button>
            </li>
          </ul>
        </section>
      </main>
    </div>

    <script src="./live-script.js"></script>
  </body>
</html>
